apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog
  namespace: namespace1

spec:
  replicas: 4

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: product-catalog

  template:
    metadata:
      labels:
        app: product-catalog

    spec:
      containers:
        - name: product-catalog

          image: janki1616/product-catalog:v1

          ports:
            - containerPort: 8080

          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_URL

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"
